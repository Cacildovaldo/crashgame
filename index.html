<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yield Farm - Funcional</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.12.4/dist/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #0f172a;
            color: white;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
        }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin: 8px 0;
            font-weight: bold;
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .danger-btn {
            background: #dc2626;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 16px;
        }
        .info {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .success { background: #10b98120; color: #10b981; display: block; }
        .error { background: #ef444420; color: #ef4444; display: block; }
        .info-status { background: #3b82f620; color: #3b82f6; display: block; }
        .flex-buttons {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .flex-buttons button {
            margin: 0;
            background: #475569;
        }
        .debug {
            font-size: 11px;
            color: #94a3b8;
            word-break: break-all;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌾 Honest Yield Farm</h2>
        <p style="font-size: 12px; color: #94a3b8;">Contrato: 0xB2Df0454E7897A5b0838a07128805bEaC40ED1eF</p>
        
        <button id="connectBtn">🔌 Conectar MetaMask / Rabby</button>
        
        <div id="infoPanel" class="info" style="display:none;"></div>
        
        <div class="info">
            <strong>📊 Status:</strong><br>
            💰 Saldo do Contrato (USDC): <span id="contractBalance">-</span><br>
            📊 Posição Ativa: <span id="activePosition">-</span><br>
            💵 Lucro Total: <span id="totalProfit">-</span>
        </div>
        
        <h3>🚀 Abrir Posição</h3>
        
        <div class="flex-buttons">
            <button id="btn1">1 USDC</button>
            <button id="btn5">5 USDC</button>
            <button id="btn10">10 USDC</button>
        </div>
        
        <input type="number" id="amount" placeholder="Digite o valor" step="0.01" value="1">
        
        <button id="depositBtn" disabled>📤 Depositar e Farmar</button>
        <button id="withdrawBtn" disabled class="danger-btn">🔚 Fechar Posição</button>
        
        <div id="status" class="status"></div>
        
        <div id="debug" class="debug"></div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xB2Df0454E7897A5b0838a07128805bEaC40ED1eF";
        
        // ABI COMPLETA com todas as funções que você precisa
        const CONTRACT_ABI = [
            "function depositAndFarm(uint256 amountUSDC) external",
            "function withdrawAndClose() external",
            "function activePosition() view returns (uint256)",
            "function totalProfit() view returns (uint256)",
            "function getContractBalance() view returns (uint256)",
            "function owner() view returns (address)",
            "function minDeposit() view returns (uint256)",
            "function leverage() view returns (uint256)",
            "function currentPosition() view returns (uint256, uint256, uint256, uint256, address)"
        ];

        let provider, signer, contract, userAddress;

        const connectBtn = document.getElementById('connectBtn');
        const depositBtn = document.getElementById('depositBtn');
        const withdrawBtn = document.getElementById('withdrawBtn');
        const amountInput = document.getElementById('amount');
        const debugDiv = document.getElementById('debug');

        function logDebug(msg) {
            debugDiv.innerHTML += new Date().toLocaleTimeString() + ": " + msg + "<br>";
            console.log(msg);
        }

        // Botões rápidos
        document.getElementById('btn1').onclick = () => { amountInput.value = "1"; };
        document.getElementById('btn5').onclick = () => { amountInput.value = "5"; };
        document.getElementById('btn10').onclick = () => { amountInput.value = "10"; };

        connectBtn.onclick = async () => {
            if (!window.ethereum) {
                alert('Instale MetaMask ou Rabby!');
                return;
            }

            try {
                logDebug("1. Conectando à carteira...");
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                logDebug(`2. Carteira conectada: ${userAddress}`);
                
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();

                const network = await provider.getNetwork();
                logDebug(`3. Rede: ${network.chainId}`);
                
                if (Number(network.chainId) !== 137) {
                    logDebug("4. Rede incorreta. Mudando para Polygon...");
                    showStatus('error', '⚠️ Mude para Polygon Mainnet');
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x89' }]
                        });
                        setTimeout(() => location.reload(), 2000);
                    } catch(e) { return; }
                }

                logDebug("4. Conectando ao contrato...");
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                
                logDebug("5. Buscando owner do contrato...");
                const ownerAddress = await contract.owner();
                logDebug(`6. Owner do contrato: ${ownerAddress}`);
                logDebug(`7. Sua carteira: ${userAddress}`);
                
                const isOwner = ownerAddress.toLowerCase() === userAddress.toLowerCase();
                logDebug(`8. É owner? ${isOwner}`);
                
                if (!isOwner) {
                    showStatus('error', '❌ Você não é o owner do contrato!');
                    depositBtn.disabled = true;
                    withdrawBtn.disabled = true;
                    return;
                }
                
                logDebug("9. Buscando saldo do contrato...");
                const balance = await contract.getContractBalance();
                const balanceNum = Number(ethers.formatUnits(balance, 6));
                logDebug(`10. Saldo do contrato: ${balanceNum} USDC`);
                
                document.getElementById('contractBalance').innerHTML = `$${balanceNum.toFixed(4)}`;
                
                logDebug("11. Buscando posição ativa...");
                const position = await contract.activePosition();
                document.getElementById('activePosition').innerHTML = `$${Number(ethers.formatUnits(position, 6)).toFixed(4)}`;
                
                logDebug("12. Buscando lucro total...");
                const profit = await contract.totalProfit();
                document.getElementById('totalProfit').innerHTML = `$${Number(ethers.formatUnits(profit, 6)).toFixed(4)}`;
                
                const infoPanel = document.getElementById('infoPanel');
                infoPanel.style.display = 'block';
                infoPanel.innerHTML = `✅ Owner confirmado: ${userAddress.slice(0,6)}...${userAddress.slice(-4)} | Saldo: $${balanceNum.toFixed(2)} USDC`;
                infoPanel.style.background = "#10b98120";
                
                // HABILITA O BOTÃO! (esta é a linha mais importante)
                depositBtn.disabled = false;
                withdrawBtn.disabled = false;
                
                if (balanceNum >= 1) {
                    showStatus('success', `✅ Contrato tem $${balanceNum.toFixed(2)} USDC. Digite 1 e clique em Depositar!`);
                } else {
                    showStatus('error', '❌ Contrato sem saldo. Transfira USDC primeiro.');
                }
                
                // Atualiza a cada 15 segundos
                setInterval(async () => {
                    if (contract) {
                        try {
                            const newBalance = await contract.getContractBalance();
                            document.getElementById('contractBalance').innerHTML = `$${Number(ethers.formatUnits(newBalance, 6)).toFixed(4)}`;
                            const newPosition = await contract.activePosition();
                            document.getElementById('activePosition').innerHTML = `$${Number(ethers.formatUnits(newPosition, 6)).toFixed(4)}`;
                            const newProfit = await contract.totalProfit();
                            document.getElementById('totalProfit').innerHTML = `$${Number(ethers.formatUnits(newProfit, 6)).toFixed(4)}`;
                        } catch(e) { logDebug("Erro ao atualizar: " + e.message); }
                    }
                }, 15000);
                
            } catch (error) {
                logDebug("ERRO: " + error.message);
                showStatus('error', error.message);
                console.error(error);
            }
        };

        depositBtn.onclick = async () => {
            let amount = parseFloat(amountInput.value);
            
            logDebug(`Tentando depositar ${amount} USDC...`);
            
            if (isNaN(amount) || amount < 1) {
                showStatus('error', 'Digite um valor >= 1 USDC');
                return;
            }
            
            // Verificar saldo do contrato NOVAMENTE
            const contractBalance = await contract.getContractBalance();
            const contractBalanceNum = Number(ethers.formatUnits(contractBalance, 6));
            logDebug(`Saldo do contrato: ${contractBalanceNum} USDC`);
            
            if (contractBalanceNum < amount) {
                showStatus('error', `❌ Contrato tem apenas $${contractBalanceNum.toFixed(2)} USDC. Transfira ${amount} USDC primeiro.`);
                return;
            }
            
            const amountWei = ethers.parseUnits(amount.toFixed(6), 6);
            
            showStatus('info', `🔄 Depositando ${amount} USDC...`);
            depositBtn.disabled = true;
            
            try {
                logDebug("Enviando transação depositAndFarm...");
                const tx = await contract.depositAndFarm(amountWei);
                logDebug(`Tx hash: ${tx.hash}`);
                showStatus('info', `⏳ Tx: ${tx.hash.slice(0,12)}...`);
                
                await tx.wait();
                logDebug("Transação confirmada!");
                
                showStatus('success', `✅ Posição aberta com ${amount} USDC!`);
                
                // Atualizar dados
                const newBalance = await contract.getContractBalance();
                document.getElementById('contractBalance').innerHTML = `$${Number(ethers.formatUnits(newBalance, 6)).toFixed(4)}`;
                const newPosition = await contract.activePosition();
                document.getElementById('activePosition').innerHTML = `$${Number(ethers.formatUnits(newPosition, 6)).toFixed(4)}`;
                
            } catch (error) {
                logDebug("ERRO na transação: " + (error.reason || error.message));
                showStatus('error', error.reason || error.message);
            } finally {
                depositBtn.disabled = false;
            }
        };

        withdrawBtn.onclick = async () => {
            if (!confirm('Fechar posição e sacar lucro?')) return;
            
            logDebug("Fechando posição...");
            showStatus('info', '🔄 Fechando posição...');
            withdrawBtn.disabled = true;
            
            try {
                const tx = await contract.withdrawAndClose();
                logDebug(`Tx hash: ${tx.hash}`);
                await tx.wait();
                logDebug("Posição fechada com sucesso!");
                showStatus('success', '✅ Posição fechada! Lucro transferido.');
                
                const newBalance = await contract.getContractBalance();
                document.getElementById('contractBalance').innerHTML = `$${Number(ethers.formatUnits(newBalance, 6)).toFixed(4)}`;
                document.getElementById('activePosition').innerHTML = `$0.00`;
                
            } catch (error) {
                logDebug("ERRO: " + (error.reason || error.message));
                showStatus('error', error.reason || error.message);
            } finally {
                withdrawBtn.disabled = false;
            }
        };

        function showStatus(type, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type === 'success' ? 'success' : (type === 'error' ? 'error' : 'info-status')}`;
            statusDiv.innerHTML = message;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 10000);
        }
    </script>
</body>
</html>
